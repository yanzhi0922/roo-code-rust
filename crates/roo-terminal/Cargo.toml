[package]
name = "roo-terminal"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Terminal integration for Roo Code Rust"

[dependencies]
roo-types = { path = "../roo-types" }
tokio = { workspace = true, features = ["fs", "process", "io-util", "sync"] }
thiserror = { workspace = true }
tracing = { workspace = true }
rand = "0.8"

[dev-dependencies]
tokio = { workspace = true, features = ["fs", "rt", "macros", "process", "io-util", "sync"] }
tempfile = "3"
